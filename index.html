<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行持ち物リストメーカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #b8860b;
      --gold-light: #f5e6c8;
      --gold-subtle: rgba(184,134,11,0.08);
      --accent: #1a1a2e;
      --accent-light: #16213e;
      --navy: #0f172a;
      --slate: #334155;
      --teal: #0d9488;
      --teal-light: #ccfbf1;
      --rose: #be123c;
      --rose-light: #fff1f2;
      --sand: #faf8f5;
      --cream: #f7f3ed;
      --white: #ffffff;
      --gray-50: #fafaf9;
      --gray-100: #f5f5f4;
      --gray-200: #e7e5e4;
      --gray-300: #d6d3d1;
      --gray-400: #a8a29e;
      --gray-500: #78716c;
      --gray-600: #57534e;
      --gray-700: #44403c;
      --gray-800: #292524;
      --gray-900: #1c1917;
      --radius: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      background: var(--sand);
      min-height: 100vh;
      color: var(--gray-800);
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }

    .serif { font-family: 'Cormorant Garamond', 'Georgia', serif; }

    .app-container {
      max-width: 880px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .app-header {
      text-align: center;
      padding: 48px 0 12px;
    }
    .app-header .logo-line {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .app-header .logo-icon {
      width: 40px; height: 40px;
      background: var(--navy);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      line-height: 1;
      overflow: hidden;
    }
    .app-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 2px;
    }
    .app-header .tagline {
      font-size: 0.82rem;
      color: var(--gray-500);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 500;
      margin-top: 6px;
    }
    .header-divider {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 16px auto 32px;
    }

    /* ─── Card ─── */
    .card {
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--gray-500);
      margin-bottom: 20px;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* ─── Travel Type Image Cards ─── */
    .type-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .type-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid transparent;
      aspect-ratio: 3 / 4;
    }
    .type-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .type-card.active {
      border-color: var(--gold);
      box-shadow: 0 8px 30px rgba(184,134,11,0.2);
    }
    .type-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .type-card:hover .type-card-img { transform: scale(1.08); }
    .type-card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 14px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      color: white;
    }
    .type-card-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .type-card-sub {
      font-size: 0.68rem;
      opacity: 0.8;
      margin-top: 2px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    .type-card-check {
      position: absolute;
      top: 10px; right: 10px;
      width: 28px; height: 28px;
      background: var(--gold);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .type-card.active .type-card-check { display: flex; }

    /* ─── Setup Grid ─── */
    .setup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .setup-grid .full-width { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gray-500);
      margin-bottom: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 0.92rem;
      font-family: inherit;
      transition: all 0.3s;
      background: var(--white);
      color: var(--gray-800);
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
    }
    input::placeholder { color: var(--gray-400); font-weight: 300; }

    /* ─── Buttons ─── */
    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--navy);
      color: white;
    }
    .btn-primary:hover { background: #111827; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-gold {
      background: linear-gradient(135deg, #b8860b, #d4a520);
      color: white;
      box-shadow: 0 4px 15px rgba(184,134,11,0.25);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(184,134,11,0.35); }
    .btn-success {
      background: var(--teal);
      color: white;
    }
    .btn-success:hover { background: #0f766e; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      color: var(--gray-600);
      border: 1.5px solid var(--gray-200);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger {
      background: var(--rose);
      color: white;
    }
    .btn-sm { padding: 7px 14px; font-size: 0.78rem; border-radius: 8px; }

    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

    .generate-btn {
      width: 100%;
      padding: 16px;
      font-size: 0.95rem;
      margin-top: 12px;
      border-radius: 12px;
      letter-spacing: 2px;
    }

    /* ─── Weather Banner ─── */
    .weather-banner {
      display: none;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: var(--radius);
      background: var(--navy);
      color: white;
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease;
    }
    .weather-banner.visible { display: flex; }
    .weather-icon { font-size: 2.8rem; }
    .weather-info h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .weather-info p { font-size: 0.82rem; opacity: 0.7; margin-top: 3px; font-weight: 300; }
    .weather-suggestion {
      margin-left: auto;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }
    .weather-suggestion:hover { background: rgba(255,255,255,0.2); }

    /* ─── Progress ─── */
    .progress-section { display: none; margin-bottom: 20px; animation: fadeUp 0.5s ease; }
    .progress-section.visible { display: block; }
    .progress-card {
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: var(--radius);
      padding: 22px 28px;
      box-shadow: var(--shadow);
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .progress-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--navy);
    }
    .progress-count {
      font-size: 0.78rem;
      color: var(--gray-400);
      font-weight: 500;
    }
    .progress-bar {
      height: 6px;
      background: var(--gray-100);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #d4a520);
      border-radius: 3px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* ─── Checklist ─── */
    .checklist-section { display: none; }
    .checklist-section.visible { display: block; }

    .category-group { margin-bottom: 20px; }
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--cream);
      border-radius: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
      border: 1px solid rgba(0,0,0,0.03);
    }
    .category-header:hover { background: var(--gold-light); }
    .category-name {
      font-weight: 600;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gray-700);
    }
    .category-name .cat-icon { font-size: 1.2rem; }
    .category-count {
      font-size: 0.72rem;
      color: var(--gold);
      background: var(--gold-subtle);
      padding: 3px 12px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .item-row:hover { background: var(--gray-50); }

    .item-checkbox {
      width: 22px; height: 22px;
      border: 2px solid var(--gray-300);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s;
      background: white;
    }
    .item-row.checked .item-checkbox {
      background: var(--teal);
      border-color: var(--teal);
    }
    .item-row.checked .item-checkbox::after {
      content: '✓';
      color: white;
      font-size: 13px;
      font-weight: 700;
    }
    .item-row.checked .item-name {
      text-decoration: line-through;
      color: var(--gray-400);
    }

    .item-name {
      flex: 1;
      font-size: 0.9rem;
      color: var(--gray-700);
      font-weight: 400;
    }

    .item-badge {
      font-size: 0.65rem;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .badge-essential {
      background: var(--rose-light);
      color: var(--rose);
      border: 1px solid rgba(190,18,60,0.15);
    }
    .badge-weather {
      background: var(--teal-light);
      color: var(--teal);
      border: 1px solid rgba(13,148,136,0.15);
    }

    .item-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      transition: all 0.2s;
      border-radius: 6px;
    }
    .item-row:hover .item-delete { opacity: 1; }
    .item-delete:hover { color: var(--rose); }

    /* Add Item */
    .add-item-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--gray-100);
    }
    .add-item-row input { flex: 1; padding: 10px 14px; font-size: 0.88rem; }
    .add-item-row select { width: auto; padding: 10px 14px; font-size: 0.85rem; }

    /* ─── Saved Lists ─── */
    .saved-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .saved-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .saved-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: all 0.3s;
      background: var(--white);
    }
    .saved-list-item:hover {
      border-color: var(--gold);
      box-shadow: var(--shadow);
    }
    .saved-list-info { cursor: pointer; flex: 1; }
    .saved-list-name { font-weight: 600; font-size: 0.92rem; color: var(--gray-800); }
    .saved-list-meta {
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-top: 3px;
      font-weight: 400;
    }
    .saved-list-actions { display: flex; gap: 6px; }

    .empty-state {
      text-align: center;
      padding: 36px 20px;
      color: var(--gray-400);
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.5; }
    .empty-state p { font-size: 0.85rem; line-height: 1.7; font-weight: 300; }

    /* ─── Modal ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,23,42,0.5);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      max-width: 520px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.4s ease;
    }
    .modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--navy);
    }
    .modal textarea {
      width: 100%;
      min-height: 200px;
      padding: 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.85rem;
      resize: vertical;
      color: var(--gray-700);
    }
    .modal textarea:focus { outline: none; border-color: var(--gold); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--navy);
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 0.5px;
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }

    /* Confetti */
    .confetti-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 3000; overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 8px; height: 8px;
      animation: confettiFall 3s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ─── App Share (Bottom) ─── */
    .app-share-section {
      margin-top: 32px;
      margin-bottom: 8px;
    }
    .app-share-inner {
      text-align: center;
      padding: 28px 24px;
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .app-share-text {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 16px;
    }
    .app-share-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .sns-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border: none;
      border-radius: 50px;
      color: white;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.3px;
    }
    .sns-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .sns-pill:active { transform: scale(0.96); }
    .sns-pill.sns-line { background: #06c755; }
    .sns-pill.sns-x { background: #000; }
    .sns-pill.sns-facebook { background: #1877f2; }

    @media (max-width: 640px) {
      .app-share-section { margin-top: 24px; }
      .app-share-inner { padding: 22px 16px; }
      .app-share-text { font-size: 0.82rem; margin-bottom: 14px; }
      .app-share-buttons { gap: 8px; }
      .sns-pill { padding: 10px 18px; font-size: 0.78rem; gap: 6px; flex: 1; justify-content: center; }
      .sns-pill svg { width: 16px; height: 16px; }
    }

    /* ─── SNS Share ─── */
    .sns-share-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .sns-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 600;
      color: white;
      transition: all 0.3s;
      letter-spacing: 0.3px;
    }
    .sns-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .sns-btn:active { transform: scale(0.96); }
    .sns-line { background: #06c755; }
    .sns-x { background: #000000; }
    .sns-facebook { background: #1877f2; }
    .sns-clipboard { background: var(--navy); }

    @media (max-width: 640px) {
      .sns-share-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .sns-btn { padding: 12px 6px; font-size: 0.65rem; border-radius: 10px; }
      .sns-btn svg { width: 18px; height: 18px; }
    }

    /* Language Switcher */
    .lang-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }
    .lang-btn {
      padding: 5px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      background: var(--white);
      color: var(--gray-500);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 0.5px;
    }
    .lang-btn:hover { border-color: var(--gold); color: var(--gold); }
    .lang-btn.active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    /* Footer */
    .app-footer {
      text-align: center;
      padding: 40px 0 24px;
      font-size: 0.72rem;
      color: var(--gray-400);
      letter-spacing: 2px;
      font-weight: 300;
    }

    /* ─── Responsive ─── */

    /* Tablet */
    @media (max-width: 768px) {
      .app-header { padding: 36px 0 10px; }

function getCurrentSeason() {
  const month = new Date().getMonth() + 1;
  if (month >= 3 && month <= 5) return 'spring';
  if (month >= 6 && month <= 8) return 'summer';
  if (month >= 9 && month <= 11) return 'autumn';
  return 'winter';
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function applySeasonalImages() {
  const season = getCurrentSeason();
  for (const type of ['overseas', 'domestic', 'business', 'outdoor']) {
    const img = document.getElementById(`img-${type}`);
    if (!img) continue;
    const urls = shuffleArray(SEASONAL_IMAGES[type][season]);
    img.src = urls[0];
    // フォールバック: 読み込み失敗時に次の画像を試行
    let attempt = 1;
    img.onerror = function() {
      if (attempt < urls.length) {
        this.src = urls[attempt];
        attempt++;
      } else {
        // 全画像が失敗した場合、グラデーション背景を表示
        this.style.display = 'none';
        this.parentElement.style.background =
          type === 'overseas' ? 'linear-gradient(135deg, #1e3a5f, #2d6a9f)' :
          type === 'domestic' ? 'linear-gradient(135deg, #5b2c6f, #c39bd3)' :
          type === 'business' ? 'linear-gradient(135deg, #1c2833, #566573)' :
          'linear-gradient(135deg, #1e8449, #52be80)';
      }
    };
  }
}

function t(key) { return I18N[currentLang]?.[key] || I18N['ja'][key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[currentLang]?.[key]) el.textContent = I18N[currentLang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (I18N[currentLang]?.[key]) el.placeholder = I18N[currentLang][key];
  });
  // Update duration options
  const dur = document.getElementById('duration');
  if (dur) {
    const keys = ['dayTrip','night1','night2','night3','night4','week1','week2','month1'];
    Array.from(dur.options).forEach((opt, i) => { if (keys[i]) opt.textContent = t(keys[i]); });
  }
  // Update category select
  const catSel = document.getElementById('newItemCategory');
  if (catSel) {
    const catKeys = ['catEssentials','catClothing','catToiletries','catElectronics','catDocuments','catMedicine','catMisc'];
    Array.from(catSel.options).forEach((opt, i) => { if (catKeys[i]) opt.textContent = t(catKeys[i]); });
  }
  // Re-render dynamic content if checklist exists
  if (state.checklist.length) renderChecklist();
  renderSavedLists();
}

document.getElementById('langSwitcher').addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLang = btn.dataset.lang;
  localStorage.setItem('travel_packing_lang', currentLang);
  applyI18n();
});

// Restore saved language
const savedLang = localStorage.getItem('travel_packing_lang');
if (savedLang && I18N[savedLang]) {
  currentLang = savedLang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

const CATEGORY_NAMES = { essentials:'必需品', clothing:'衣類', toiletries:'洗面用具', electronics:'電子機器', documents:'書類', medicine:'医薬品', misc:'その他' };

let state = { travelType: 'overseas', checklist: [], weatherData: null, currentListId: null };
let idCounter = 0;
function nextId() { return ++idCounter; }
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// Type Selector
$('#typeSelector').addEventListener('click', (e) => {
  const card = e.target.closest('.type-card');
  if (!card) return;
  $$('.type-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  state.travelType = card.dataset.type;
});

// Generate
$('#generateBtn').addEventListener('click', () => generateChecklist());

function generateChecklist() {
  const template = TEMPLATES[state.travelType];
  state.checklist = [];
  state.currentListId = null;
  for (const [catKey, catData] of Object.entries(template)) {
    for (const item of catData.items) {
      state.checklist.push({ id: nextId(), name: item.name, category: catKey, checked: false, essential: item.essential || false, weather: false });
    }
  }
  state.weatherData = null;
  $('#weatherBanner').classList.remove('visible');
  renderChecklist();
  showSection();
}

// Weather
$('#weatherBtn').addEventListener('click', async () => {
  const dest = $('#destination').value.trim();
  if (!dest) { showToast(t('enterDest')); $('#destination').focus(); return; }
  $('#weatherBtn').textContent = t('fetching');
  $('#weatherBtn').disabled = true;
  try {
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(dest)}&count=1&language=ja`);
    const geoData = await geoRes.json();
    if (!geoData.results?.length) { showToast(t('notFound')); return; }
    const { latitude, longitude, name } = geoData.results[0];
    const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=auto&forecast_days=7`);
    const wxData = await wxRes.json();
    const d = wxData.daily;
    const avgMax = d.temperature_2m_max.reduce((a,b)=>a+b,0)/d.temperature_2m_max.length;
    const avgMin = d.temperature_2m_min.reduce((a,b)=>a+b,0)/d.temperature_2m_min.length;
    const avgP = d.precipitation_probability_max.reduce((a,b)=>a+b,0)/d.precipitation_probability_max.length;
    const code = d.weathercode[0];
    let wt='mild',we='🌤️',wl='快適';
    if(code>=71){wt='snowy';we='❄️';wl='雪';}
    else if(code>=51||avgP>50){wt='rainy';we='🌧️';wl='雨';}
    else if(avgMax>30){wt='hot';we='☀️';wl='猛暑';}
    else if(avgMax>25){wt='hot';we='🌞';wl='暑い';}
    else if(avgMin<5){wt='cold';we='🥶';wl='寒い';}
    else if(avgMin<10){wt='cold';we='🧣';wl='肌寒い';}
    state.weatherData={type:wt,name,emoji:we,label:wl,maxTemp:Math.round(avgMax),minTemp:Math.round(avgMin),precip:Math.round(avgP)};
    $('#weatherIcon').textContent=we;
    $('#weatherTitle').textContent=`${name}${t('forecast')}`;
    $('#weatherDesc').textContent=`${wl} ${state.weatherData.maxTemp}°C / ${state.weatherData.minTemp}°C ・ ${t('precip')} ${state.weatherData.precip}%`;
    $('#weatherBanner').classList.add('visible');
    if(!state.checklist.length) generateChecklist();
  } catch(err) { showToast(t('weatherFail')); console.error(err); }
  finally { $('#weatherBtn').textContent=t('checkWeather'); $('#weatherBtn').disabled=false; }
});

$('#addWeatherItems').addEventListener('click', () => {
  if(!state.weatherData||!WEATHER_ITEMS[state.weatherData.type]) return;
  let c=0;
  for(const item of WEATHER_ITEMS[state.weatherData.type]){
    if(!state.checklist.some(i=>i.name===item.name)){
      state.checklist.push({id:nextId(),name:item.name,category:item.category,checked:false,essential:false,weather:true}); c++;
    }
  }
  if(c>0){showToast(`${c}${t('added')}`);renderChecklist();}else showToast(t('alreadyAdded'));
});

// Render
function renderChecklist(){
  const container=$('#checklistContainer');
  container.innerHTML='';
  const groups={};
  for(const item of state.checklist){if(!groups[item.category])groups[item.category]=[];groups[item.category].push(item);}
  for(const[catKey,items]of Object.entries(groups)){
    const tmpl=TEMPLATES[state.travelType];
    const ci=tmpl[catKey]?.icon||CATEGORY_ICONS[catKey]||'📦';
    const cn=tmpl[catKey]?.name||CATEGORY_NAMES[catKey]||catKey;
    const cc=items.filter(i=>i.checked).length;
    const g=document.createElement('div');g.className='category-group';
    g.innerHTML=`<div class="category-header"><span class="category-name"><span class="cat-icon">${ci}</span>${cn}</span><span class="category-count">${cc} / ${items.length}</span></div>
    <div class="category-items">${items.map(item=>`<div class="item-row ${item.checked?'checked':''}" data-id="${item.id}"><div class="item-checkbox"></div><span class="item-name">${item.name}</span>${item.essential?`<span class="item-badge badge-essential">${t('must')}</span>`:''}${item.weather?`<span class="item-badge badge-weather">${t('weather')}</span>`:''}<button class="item-delete" title="${t('delete')}">×</button></div>`).join('')}</div>`;
    container.appendChild(g);
  }
  updateProgress();
  $('#currentListName').textContent=$('#listName').value.trim()||t('packingList');
}

// Interactions
$('#checklistContainer').addEventListener('click',(e)=>{
  const row=e.target.closest('.item-row');
  if(row&&!e.target.closest('.item-delete')){const id=parseInt(row.dataset.id);const item=state.checklist.find(i=>i.id===id);if(item){item.checked=!item.checked;renderChecklist();}return;}
  const del=e.target.closest('.item-delete');
  if(del){state.checklist=state.checklist.filter(i=>i.id!==parseInt(del.closest('.item-row').dataset.id));renderChecklist();}
});

$('#addItemBtn').addEventListener('click',addItem);
$('#newItemInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')addItem();});
function addItem(){
  const n=$('#newItemInput').value.trim();if(!n)return;
  state.checklist.push({id:nextId(),name:n,category:$('#newItemCategory').value,checked:false,essential:false,weather:false});
  $('#newItemInput').value='';renderChecklist();showToast(`「${n}」${t('add')}`);
}

$('#uncheckAllBtn').addEventListener('click',()=>{state.checklist.forEach(i=>i.checked=false);renderChecklist();showToast(t('unchecked'));});

// Progress
function updateProgress(){
  const total=state.checklist.length,checked=state.checklist.filter(i=>i.checked).length;
  const p=total>0?Math.round((checked/total)*100):0;
  $('#progressText').textContent=p===100&&total>0?t('complete'):`${t('progress')} — ${p}%`;
  $('#progressCount').textContent=`${checked} / ${total}`;
  $('#progressFill').style.width=`${p}%`;
  if(p===100&&total>0){$('#progressFill').style.background='linear-gradient(90deg,#0d9488,#14b8a6)';launchConfetti();}
  else{$('#progressFill').style.background='linear-gradient(90deg,var(--gold),#d4a520)';}
}

function launchConfetti(){
  const c=$('#confettiContainer');c.innerHTML='';
  const cols=['#b8860b','#d4a520','#0d9488','#be123c','#0f172a','#f59e0b'];
  for(let i=0;i<50;i++){const d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'%';d.style.background=cols[Math.floor(Math.random()*cols.length)];d.style.animationDelay=Math.random()*2+'s';d.style.animationDuration=(2+Math.random()*2)+'s';d.style.width=(5+Math.random()*7)+'px';d.style.height=(5+Math.random()*7)+'px';d.style.borderRadius=Math.random()>0.5?'50%':'1px';c.appendChild(d);}
  setTimeout(()=>c.innerHTML='',4000);
}

function showSection(){
  $('#progressSection').classList.add('visible');
  $('#checklistSection').classList.add('visible');
  updateProgress();
  setTimeout(()=>$('#progressSection').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

// Storage
const SK='travel_packing_lists';
function getSaved(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch{return[];}}
function saveLists(l){localStorage.setItem(SK,JSON.stringify(l));}

$('#saveListBtn').addEventListener('click',()=>{
  const name=$('#listName').value.trim()||`${getTypeName(state.travelType)}リスト`;
  const ld={id:state.currentListId||Date.now(),name,destination:$('#destination').value.trim(),travelType:state.travelType,duration:$('#duration').value,checklist:state.checklist,weatherData:state.weatherData,savedAt:new Date().toISOString()};
  const ls=getSaved();const idx=ls.findIndex(l=>l.id===ld.id);
  if(idx>=0)ls[idx]=ld;else ls.unshift(ld);
  saveLists(ls);state.currentListId=ld.id;renderSavedLists();showToast(t('saved'));
});

function loadList(ld){
  state.travelType=ld.travelType;state.checklist=ld.checklist;state.weatherData=ld.weatherData;state.currentListId=ld.id;
  idCounter=Math.max(0,...state.checklist.map(i=>i.id));
  $$('.type-card').forEach(c=>c.classList.toggle('active',c.dataset.type===state.travelType));
  $('#destination').value=ld.destination||'';$('#duration').value=ld.duration||'2';$('#listName').value=ld.name||'';
  if(state.weatherData){$('#weatherIcon').textContent=state.weatherData.emoji;$('#weatherTitle').textContent=`${state.weatherData.name}${t('forecast')}`;$('#weatherDesc').textContent=`${state.weatherData.label} ${state.weatherData.maxTemp}°C / ${state.weatherData.minTemp}°C`;$('#weatherBanner').classList.add('visible');}
  else{$('#weatherBanner').classList.remove('visible');}
  renderChecklist();showSection();showToast(`「${ld.name}」${t('loaded')}`);
}

function deleteList(id){saveLists(getSaved().filter(l=>l.id!==id));if(state.currentListId===id)state.currentListId=null;renderSavedLists();showToast(t('deleted'));}

function renderSavedLists(){
  const ls=getSaved(),c=$('#savedListsContainer');
  if(!ls.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon">📦</div><p>${t('noSaved')}</p></div>`;return;}
  c.innerHTML=ls.map(l=>{
    const tot=l.checklist.length,ch=l.checklist.filter(i=>i.checked).length,p=tot>0?Math.round((ch/tot)*100):0;
    const date=new Date(l.savedAt).toLocaleDateString('ja-JP');
    return `<div class="saved-list-item"><div class="saved-list-info" data-id="${l.id}"><div class="saved-list-name">${l.name}</div><div class="saved-list-meta">${getTypeName(l.travelType)}${l.destination?' ・ '+l.destination:''} ・ ${p}% ・ ${date}</div></div><div class="saved-list-actions"><button class="btn btn-sm btn-primary load-list-btn" data-id="${l.id}">${t('load')}</button><button class="btn btn-sm btn-danger delete-list-btn" data-id="${l.id}">${t('delete')}</button></div></div>`;
  }).join('');
}

$('#savedListsContainer').addEventListener('click',(e)=>{
  const lb=e.target.closest('.load-list-btn');if(lb){const l=getSaved().find(l=>l.id===parseInt(lb.dataset.id));if(l)loadList(l);return;}
  const db=e.target.closest('.delete-list-btn');if(db){deleteList(parseInt(db.dataset.id));return;}
  const info=e.target.closest('.saved-list-info');if(info){const l=getSaved().find(l=>l.id===parseInt(info.dataset.id));if(l)loadList(l);}
});

// Share
$('#shareBtn').addEventListener('click',()=>{
  const name=$('#listName').value.trim()||t('packingList');
  const dest=$('#destination').value.trim();
  let text=`✈️ ${name}\n`;if(dest)text+=`📍 ${dest}\n`;text+=`━━━━━━━━━━━━━━━━━━\n\n`;
  const groups={};for(const item of state.checklist){if(!groups[item.category])groups[item.category]=[];groups[item.category].push(item);}
  for(const[ck,items]of Object.entries(groups)){
    text+=`${CATEGORY_ICONS[ck]||'📦'} ${CATEGORY_NAMES[ck]||ck}\n`;
    for(const item of items)text+=`  ${item.checked?'✅':'⬜'} ${item.name}${item.essential?' ⚠️必須':''}\n`;text+='\n';
  }
  const tot=state.checklist.length,chk=state.checklist.filter(i=>i.checked).length;
  text+=`━━━━━━━━━━━━━━━━━━\n📊 ${chk}/${tot} (${tot>0?Math.round((chk/tot)*100):0}%)\n`;
  $('#shareText').value=text;$('#shareModal').classList.add('visible');
});

// クリップボードコピー共通関数
function copyAndClose() {
  navigator.clipboard.writeText($('#shareText').value).then(()=>{
    showToast(t('copied'));$('#shareModal').classList.remove('visible');
  }).catch(()=>{
    $('#shareText').select();document.execCommand('copy');
    showToast(t('copied'));$('#shareModal').classList.remove('visible');
  });
}

$('#copyShareBtn').addEventListener('click', copyAndClose);
$('#copyShareBtn2').addEventListener('click', copyAndClose);

// SNS共有用の短縮テキスト生成
function getShareSummary() {
  const name = $('#listName').value.trim() || t('packingList');
  const dest = $('#destination').value.trim();
  const tot = state.checklist.length;
  const chk = state.checklist.filter(i => i.checked).length;
  const pct = tot > 0 ? Math.round((chk / tot) * 100) : 0;
  let summary = `✈️ ${name}`;
  if (dest) summary += ` 📍${dest}`;
  summary += ` | ${t('progress')} ${pct}% (${chk}/${tot})`;
  // 必須アイテムの未チェック警告
  const uncheckedEssentials = state.checklist.filter(i => i.essential && !i.checked);
  if (uncheckedEssentials.length > 0) {
    summary += `\n⚠️ ${t('must')}: ${uncheckedEssentials.slice(0, 5).map(i => i.name).join(', ')}`;
    if (uncheckedEssentials.length > 5) summary += `...`;
  }
  return summary;
}

// LINE共有
$('#shareLine').addEventListener('click', () => {
  const text = encodeURIComponent(getShareSummary());
  window.open(`https://social-plugins.line.me/lineit/share?text=${text}`, '_blank', 'width=600,height=500');
  $('#shareModal').classList.remove('visible');
});

// X (Twitter) 共有
$('#shareX').addEventListener('click', () => {
  const text = encodeURIComponent(getShareSummary());
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank', 'width=600,height=500');
  $('#shareModal').classList.remove('visible');
});

// Facebook共有
$('#shareFacebook').addEventListener('click', () => {
  const text = encodeURIComponent(getShareSummary());
  window.open(`https://www.facebook.com/sharer/sharer.php?quote=${text}`, '_blank', 'width=600,height=500');
  $('#shareModal').classList.remove('visible');
});

$('#closeModal').addEventListener('click',()=>$('#shareModal').classList.remove('visible'));
$('#shareModal').addEventListener('click',(e)=>{if(e.target===$('#shareModal'))$('#shareModal').classList.remove('visible');});

};

function getAppShareText() { return APP_SHARE_TEXT[currentLang] || APP_SHARE_TEXT['ja']; }

function getTypeName(type){return{overseas:t('overseas'),domestic:t('domestic'),business:t('business'),outdoor:t('outdoor')}[type]||type;}
function showToast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('visible');setTimeout(()=>el.classList.remove('visible'),2500);}

renderSavedLists();
applyI18n();
</script>
